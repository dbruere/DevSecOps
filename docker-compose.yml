services:
  web:
    build: .
    container_name: intranet_web
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=backend/app.py
      # FLASK_DEBUG a 0 pour la production (securite DevSecOps)
      - FLASK_DEBUG=1
      - DATABASE_URL=mysql+pymysql://intranet_user:IntranetSecurePass!@db:3306/intranet
      - FLASK_SECRET_KEY=cle_secrete_ultra_securisee_a_changer_en_prod
    depends_on:
      db:
        condition: service_healthy
    # En production, on enleve le 'volumes: - .:/app' pour eviter que le conteneur lise les fichiers locaux
    volumes:
      - .:/app
    restart: unless-stopped

  db:
    image: mysql
    container_name: intranet_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: RootSecurePassword!
      MYSQL_DATABASE: intranet
      MYSQL_USER: intranet_user
      MYSQL_PASSWORD: IntranetSecurePass!
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRootSecurePassword!"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:

